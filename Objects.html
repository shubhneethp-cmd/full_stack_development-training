<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Object – John Doe</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            text-align: center;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>John Doe Profile</h1>

        <p id="statement">
            Click the button to view John Doe's full statement.
        </p>

        <button onclick="showStatement()">Show Statement</button>
    </div>

    <script>
        // JavaScript Object
        const person = {
            firstName: "John",
            lastName: "Doe",
            age: 25,
            gender: "Male",
            profession: "Web Developer",
            skills: ["HTML", "CSS", "JavaScript", "AI"],
            city: "New Delhi",
            country: "India"
        };

        // Function to display full statement
        function showStatement() {
            document.getElementById("statement").innerHTML =
                "My name is " + person.firstName + " " + person.lastName + ". " +
                "I am a " + person.age + "-year-old " + person.gender + ". " +
                "I work as a " + person.profession + ". " +
                "My skills include " + person.skills.join(", ") + ". " +
                "I live in " + person.city + ", " + person.country + ".";
        }
    </script>

</body>
</html>
