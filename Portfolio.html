body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
}

.profile {
    padding: 40px;
}

.profile-img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid #333;
    object-fit: cover;
}



.profile-img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}


        /* NAVBAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: orange;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 15px;
        }

        nav a:hover {
            color: orange;
        }

        /* HERO SECTION */
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px;
            min-height: 85vh;
        }

        .content {
            max-width: 600px;
        }

        .content h1 {
            font-size: 50px;
            line-height: 1.2;
        }

        .content h1 span {
            color: orange;
        }

        .content p {
            margin: 20px 0;
            color: #ddd;
            line-height: 1.6;
        }

        .btn {
            padding: 12px 30px;
            background: orange;
            color: black;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #ff9f1a;
        }

        /* LOGIN / CARD */
        .card {
            background: rgba(0,0,0,0.8);
            padding: 30px;
            width: 300px;
            border-radius: 10px;
        }

        .card h2 {
            text-align: center;
            color: orange;
            margin-bottom: 20px;
        }

        .card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid orange;
            color: white;
        }

        .card input::placeholder {
            color: #ccc;
        }

        .login-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: orange;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #ff9f1a;
        }

        .card p {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .card p span {
            color: orange;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                text-align: center;
            }

            .card {
                margin-top: 40px;
            }
        }
    </style>
</head>
<body>
